<body>

<div class="navbar">
<a href="index.html">Home</a>

<div class="container">

<div id="login-screen" style="display:none;">

<img src="logo.png" class="logo" alt="HEIZO Logo">

<h1>HEIZO AI</h1>

<button
  id="google-login-btn"
  class="btn"
  style="
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
  "
>
  <img
    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"

    style="
      width:24px;
      height:24px;

  >

</button>

<button
  id="email-login-btn"
  class="btn"
  style="
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-top:16px;
  "
>
  <img
    src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico"

      width:22px;

    "
  >

  <span>Continue with Email</span>
</button>

<div id="chat-screen" style="display:block; padding-top:120px;">

<div id="menu-btn">☰</div>

<div id="account-btn">⌬</div>

<div class="chat-box">

<div class="message ai">
Hello. I am HEIZO AI.

How can I help you today?
</div>

</div>

<div class="input-area">

<input
type="text"
placeholder="Ask anything..."
>

<button id="send-btn">Send</button>

</div>

<script>

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".fade-up").forEach(el=>{
observer.observe(el);
});
const input = document.querySelector("input");
const button = document.getElementById("send-btn");
const chatBox = document.querySelector(".chat-box");
input.addEventListener("keypress", (event) => {

    if(event.key === "Enter"){
    event.preventDefault();
    button.click();
    }

});
let chatHistory = JSON.parse(localStorage.getItem("heizoChat")) || [];

chatHistory.forEach(msg => {

    const message = document.createElement("div");

    if (msg.type === "user") {

        message.className = "message";

        message.style.background = "#ffffff";
        message.style.marginLeft = "auto";
        message.style.border = "1px solid #d8dde5";
        message.style.borderRadius = "18px";
        message.style.marginRight = "12px";

    } else {

        message.className = "message ai";

    }

    message.innerHTML = msg.text;

if(msg.type === "ai"){
    const copyBtn = document.createElement("div");
    copyBtn.className = "copy-btn";
    copyBtn.innerHTML = "⧉";

    copyBtn.onclick = () => {
    navigator.clipboard.writeText(msg.text);

    const toast = document.createElement("div");

    toast.innerText = "Copied";

    toast.style.position = "fixed";
    toast.style.bottom = "90px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "#111827";
    toast.style.color = "white";
    toast.style.padding = "8px 14px";
    toast.style.borderRadius = "10px";
    toast.style.fontSize = "14px";
    toast.style.zIndex = "9999";

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 1500);
};

chatBox.appendChild(message);
chatBox.appendChild(copyBtn);
return;
}

chatBox.appendChild(message);

});
setTimeout(() => {
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "instant"
    });
}, 100);

let isGenerating = false;

button.addEventListener("click", async () => {

if(input.value.trim() === "") return;
if(isGenerating) return;

isGenerating = true;

button.disabled = true;

const userMessage = document.createElement("div");

userMessage.className = "message";
userMessage.style.background = "#ffffff";
userMessage.style.marginLeft = "auto";
userMessage.style.border = "1px solid #d8dde5";
userMessage.style.borderRadius = "18px";
userMessage.style.marginRight = "12px";

const userText = input.value;
userMessage.textContent = userText;
input.value = "";

chatBox.appendChild(userMessage);

userMessage.scrollIntoView({
    behavior: "instant",
    block: "start"
});

chatHistory.push({
    type: "user",
    text: userText
});

localStorage.setItem(
    "heizoChat",
    JSON.stringify(chatHistory)
);

const thinkingMessage = document.createElement("div");

thinkingMessage.className = "message ai";

thinkingMessage.innerHTML = "⏳ Heizo está pensando...";

chatBox.appendChild(thinkingMessage);

setTimeout(() => {
    thinkingMessage.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}, 50);

try {

console.log("Enviando pregunta");

const response = await fetch("https://noisy-boat-15c3.heizoai.workers.dev/", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: userText,
history: chatHistory.slice(-30)
})
});

if (!response.ok) {
    throw new Error(
        "HTTP Error: " + response.status
    );
}

const reader = response.body.getReader();
const decoder = new TextDecoder();

let fullReply = "";
let buffer = "";

console.log("Respuesta recibida");

thinkingMessage.remove();

const aiMessage = document.createElement("div");

aiMessage.className = "message ai";

aiMessage.textContent = "";

const copyBtn = document.createElement("div");

copyBtn.className = "copy-btn";

copyBtn.innerHTML = "⧉";

copyBtn.onclick = () => {

    navigator.clipboard.writeText(aiMessage.textContent);

    const toast = document.createElement("div");

    toast.innerText = "Copiado";

    toast.style.position = "fixed";
    toast.style.bottom = "100px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "#0f172a";
    toast.style.color = "white";
    toast.style.padding = "8px 14px";
    toast.style.borderRadius = "10px";
    toast.style.fontSize = "14px";
    toast.style.zIndex = "9999";

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 1500);

};

chatBox.appendChild(aiMessage);
chatBox.appendChild(copyBtn);

    while (true) {

const { done, value } = await reader.read();

if (done) break;

buffer += decoder.decode(value, { stream: true });

const lines = buffer.split("\n");

buffer = lines.pop() || "";

for (const line of lines) {

if (!line.startsWith("data: ")) continue;

const data = line.slice(6).trim();

if (data === "[DONE]") continue;

try {

            const json = JSON.parse(data);

            const content =
                json.choices?.[0]?.delta?.content || "";

            fullReply += content;

            aiMessage.textContent = fullReply;

            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (e) {}

    }

    }

chatBox.scrollTop = chatBox.scrollHeight;

const userTop = userMessage.offsetTop;

window.scrollTo({
    top: userTop - 120,
    behavior: "smooth"
});

chatHistory.push({
    type: "ai",
    text: fullReply
});

localStorage.setItem(
    "heizoChat",
    JSON.stringify(chatHistory)
);

isGenerating = false;
button.disabled = false;

} catch (error) {

isGenerating = false;
button.disabled = false;

console.error(error);

thinkingMessage.remove();

const aiMessage = document.createElement("div");

aiMessage.className = "message ai";

aiMessage.textContent =
"⚠️ Error temporal de conexión. Intenta nuevamente.";

chatBox.appendChild(aiMessage);

}

input.value = "";

chatBox.scrollTop = chatBox.scrollHeight;

});

// ===== SUPABASE LOGIN =====

const SUPABASE_URL =
"https://ioutmijkalkskuufnbof.supabase.co";

const SUPABASE_KEY =
"sb_publishable_l-1rly5RjpMmY-wTX61zrQ_n3NoopA8";

const supabaseClient =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const googleBtn =
document.getElementById("google-login-btn");

if (googleBtn) {

  googleBtn.addEventListener(
    "click",
    async () => {

      try {

        await supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo:
              window.location.origin +
              window.location.pathname
          }
        });

      } catch (err) {

        console.error(
          "Google Login Error:",
          err
        );

      }

    }
  );

}

const loginScreen =
document.getElementById("login-screen");

const chatScreen =
document.getElementById("chat-screen");

supabaseClient.auth.getUser().then(({ data }) => {

    if (data.user) {

        loginScreen.style.display = "none";
        chatScreen.style.display = "block";

    } else {

        loginScreen.style.display = "block";
        chatScreen.style.display = "none";

    }

});

</script>
